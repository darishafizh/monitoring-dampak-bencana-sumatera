<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>KKP - Detail Rencana Induk</title>
    <link rel="icon" type="image/png" href="logo-kkp.png">
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <style>
        .detail-container {
            max-width: 1050px;
            margin: 2.5rem auto;
            padding: 0 var(--space-6);
        }
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background-color: var(--primary);
            color: white;
            text-decoration: none;
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 2rem;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
        }
        .btn-back:hover {
            background-color: #021a40;
            transform: translateX(-4px);
            box-shadow: var(--shadow-md);
        }
        .detail-card {
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
            overflow: hidden;
        }
        .detail-header {
            background: linear-gradient(135deg, var(--primary) 0%, #043685 100%);
            color: white;
            padding: 2.5rem 3rem;
            border-bottom: 5px solid var(--accent);
        }
        .detail-header h1 {
            font-size: 1.85rem;
            font-weight: 800;
            line-height: 1.3;
            margin-bottom: 0.75rem;
            color: white;
        }
        .detail-header p {
            color: #e2e8f0;
            font-size: 1.05rem;
            font-weight: 400;
            line-height: 1.5;
        }
        .detail-body {
            padding: 3rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2.5rem;
        }
        @media (max-width: 768px) {
            .detail-body { grid-template-columns: 1fr; padding: 1.5rem; }
            .detail-header { padding: 1.5rem; }
        }
        .section-title {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--primary);
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 0.6rem;
            margin-bottom: 0.5rem;
            grid-column: span 2;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        @media (max-width: 768px) {
            .section-title { grid-column: span 1; }
        }
        .info-group {
            margin-bottom: 1rem;
        }
        .info-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.35rem;
        }
        .info-value {
            font-size: 0.95rem;
            font-weight: 500;
            color: #1e293b;
            line-height: 1.6;
        }
        .bullet-list {
            margin: 0;
            padding-left: 1.25rem;
            list-style-type: disc;
        }
        .bullet-list li {
            margin-bottom: 0.25rem;
            color: #1e293b;
            font-weight: 500;
        }
        .budget-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.25rem;
            grid-column: span 2;
            margin-top: 0.5rem;
            margin-bottom: 1rem;
        }
        @media (max-width: 768px) {
            .budget-grid { grid-column: span 1; grid-template-columns: 1fr; }
        }
        .budget-box {
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            padding: 1.5rem;
            border-radius: var(--radius-md);
            text-align: center;
            transition: all 0.2s ease;
        }
        .budget-box:hover {
            border-color: var(--accent);
            box-shadow: var(--shadow-sm);
        }
        .budget-year {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.75rem;
        }
        .budget-amount {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }
        .budget-output {
            font-size: 0.85rem;
            color: #475569;
            background: white;
            padding: 0.5rem;
            border-radius: 4px;
            border: 1px solid #e2e8f0;
        }
        .total-box {
            grid-column: span 2;
            background: linear-gradient(to right, rgba(3, 37, 92, 0.06), rgba(3, 84, 92, 0.06));
            border: 2px solid var(--primary);
            padding: 1.75rem 2rem;
            border-radius: var(--radius-md);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        @media (max-width: 768px) {
            .total-box { grid-column: span 1; flex-direction: column; text-align: center; gap: 0.75rem; }
        }
        .total-label {
            font-size: 1.35rem;
            font-weight: 800;
            color: var(--primary);
        }
        .total-val {
            font-size: 2rem;
            font-weight: 800;
            color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Top Navigation -->
        <header class="top-navbar">
            <div class="nav-container">
                <div class="nav-brand">
                    <div class="brand-logo"><img src="logo-kkp.png" alt="Logo KKP"></div>
                    <div class="brand-title">
                        <h1>Dashboard Analisis</h1>
                        <p>Rencana Induk Rehabilitasi dan Rekonstruksi Pascabencana Sumatera (2026-2028)</p>
                    </div>
                </div>
            </div>
        </header>

        <main class="detail-container">
            <a href="index.html" class="btn-back">← Kembali ke Dashboard</a>

            <div class="detail-card" id="detail-content">
                <div style="padding: 4rem; text-align: center; color: #64748b; font-size: 1.1rem;">Memuat detail data...</div>
            </div>
        </main>
    </div>

    <!-- Data & Detail Script -->
    <script src="data.js"></script>
    <script src="detail.js"></script>
</body>
</html>
